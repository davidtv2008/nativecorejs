    <style>
    html[data-public-route="pending"] body {
            visibility: hidden;
            opacity: 0;
    }
    </style>
    <script>
    (function() {
            const isRootPath = window.location.pathname === '/';
            if (!isRootPath) {
                document.documentElement.setAttribute('data-public-route', 'pending');
                window.addEventListener('pageloaded', function handlePageLoaded() {
                    document.documentElement.setAttribute('data-public-route', 'ready');
                    window.removeEventListener('pageloaded', handlePageLoaded);
                });
                return;
            }
            document.documentElement.setAttribute('data-public-route', 'ready');
    })();
    </script>
    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
    "@context": "https://schema.org",

    "name": "NativeCoreJS",

    },

    </script>
    <!-- Stylesheets and modulepreloads with cache busting -->
    <script>(function() {
        var isDev = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
        var version = isDev ? Date.now() : '1.0.0-20260414231644';
        var head = document.head;

        [
            '/dist/src/app.js',
            '/dist/src/controllers/home.controller.js',
            '/dist/src/components/core/app-header.js',
            '/dist/src/components/core/app-sidebar.js',
            '/dist/src/components/core/app-footer.js',
            '/dist/src/components/core/loading-spinner.js',
            '/dist/src/components/core/nc-a.js',
            '/dist/src/components/core/nc-scroll-top.js',
            '/dist/src/components/core/nc-snackbar.js'
        ].forEach(function(path) {
            var link = document.createElement('link');
            link.rel = 'modulepreload';
            link.href = path + '?v=' + version;
            head.appendChild(link);
        });

        [
            '/src/styles/core-variables.css',
            '/src/styles/core.css',
            '/src/styles/variables.css',
            '/src/styles/main.css'
        ].forEach(function(href) {
            var link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = href + '?v=' + version;
            head.appendChild(link);
        });
    })();</script>
</head>
<body>
    <div id="page-progress" role="progressbar" aria-label="Page loading progress"></div>

    <div id="app" class="no-sidebar">
        <app-header class="app-header"></app-header>
        <app-sidebar></app-sidebar>
        <main class="main-content">
            <nc-error-boundary mode="dev">
                <div id="main-content" class="page">
                    <loading-spinner message="Loading page..."></loading-spinner>
                </div>
            </nc-error-boundary>
            <app-footer></app-footer>
        </main>
        <nc-scroll-top to="top"></nc-scroll-top>
    </div>

    <nc-snackbar position="bottom-right"></nc-snackbar>

    <script type="module">
        (function() {
            const isDev = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
            const version = isDev ? Date.now() : '0.1.0-20260424231326';
            import(`/dist/src/app.js?v=${version}`);
        })();
    </script>
</body>
