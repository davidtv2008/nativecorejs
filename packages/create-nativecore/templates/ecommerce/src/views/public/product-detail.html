<div data-view="product-detail">
    <nc-skeleton data-hook="skeleton" active></nc-skeleton>

    <div class="product" data-hook="product" hidden>
        <div class="product__gallery">
            <nc-image data-hook="image" alt="" object-fit="contain"></nc-image>
        </div>

        <div class="product__info">
            <nc-badge data-hook="category" variant="secondary"></nc-badge>
            <h1 class="product__name" data-hook="name"></h1>
            <p class="product__price" data-hook="price"></p>
            <div class="product__rating">
                <nc-rating data-hook="rating" readonly></nc-rating>
                <span data-hook="review-count" class="review-count"></span>
            </div>
            <p class="product__description" data-hook="description"></p>

            <div class="product__actions">
                <nc-number-input data-hook="quantity" min="1" max="99" value="1"></nc-number-input>
                <nc-button variant="primary" full-width data-hook="btn-add-cart">Add to Cart</nc-button>
            </div>
        </div>
    </div>

    <nav class="product__nav">
        <nc-button variant="outline" data-hook="btn-back">← Back to Shop</nc-button>
    </nav>

    <nc-snackbar data-hook="snackbar"></nc-snackbar>
</div>
