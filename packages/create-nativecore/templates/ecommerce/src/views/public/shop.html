<div data-view="shop">
    <aside class="shop-filters">
        <h2 class="filter-title">Filter</h2>
        <nc-select data-hook="filter-category" placeholder="Category" clearable></nc-select>
        <div class="price-range">
            <label>Max Price</label>
            <nc-slider data-hook="filter-price" min="0" max="500" value="500"></nc-slider>
            <span data-hook="price-label">$500</span>
        </div>
    </aside>

    <main class="shop-main">
        <header class="shop-header">
            <nc-input data-hook="search" placeholder="Search products…" clearable></nc-input>
            <nc-select data-hook="sort" placeholder="Sort by">
                <option value="newest">Newest</option>
                <option value="price-asc">Price: Low → High</option>
                <option value="price-desc">Price: High → Low</option>
            </nc-select>
        </header>

        <ul class="product-grid" data-hook="product-grid">
            <li><nc-skeleton active height="240px"></nc-skeleton></li>
            <li><nc-skeleton active height="240px"></nc-skeleton></li>
            <li><nc-skeleton active height="240px"></nc-skeleton></li>
            <li><nc-skeleton active height="240px"></nc-skeleton></li>
            <li><nc-skeleton active height="240px"></nc-skeleton></li>
            <li><nc-skeleton active height="240px"></nc-skeleton></li>
        </ul>

        <nc-empty-state data-hook="empty" hidden icon="🛒" message="No products match your filters."></nc-empty-state>
        <nc-pagination data-hook="pagination" total="0" page-size="12" current="1"></nc-pagination>
    </main>
</div>
